name: CI

# `lint` and `test` run in parallel; `build needs: [lint, test]` so a
# package can never build before lint has passed (OpenSpec §4.3).
#
# Dependabot PRs are handled by dependabot-lockfile.yml (which refreshes
# bun.lock first and then runs the same checks inline), so we skip them
# here. GitHub treats skipped required checks as passing since 2022, so
# branch protection still works.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default GITHUB_TOKEN: lint/test/build only read the repo.
permissions:
  contents: read

jobs:
  lint:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      # Guardrail: the @eigenpal -> @heyirisai rebrand happens ONLY at publish
      # time (scripts/brand-rename.mjs, in the ephemeral CI workspace). Source
      # on `main` must stay under the upstream @eigenpal scope so upstream
      # syncs merge cleanly. Fail the build if the branded scope leaks into any
      # tracked file the rename touches — package manifests + configs + src
      # under packages/, and the changeset config — not just src/.
      # `git grep` searches tracked files only, so the (gitignored) dist/ built
      # artifacts are excluded automatically; the rename tooling under
      # scripts/ and .github/ is out of scope here so it isn't matched.
      - name: Guard against branded scope in source
        run: |
          if git grep -n '@heyirisai/' -- packages .changeset; then
            echo "::error::Found '@heyirisai/' in tracked source (packages/ or .changeset/). The rebrand must happen only at publish time (scripts/brand-rename.mjs), never in source — revert these occurrences."
            exit 1
          fi
          echo "OK: no @heyirisai/ in tracked source."

  test:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: i18n locale + typed-exports sync check
        run: bun run i18n:validate

      - name: Run tests
        run: bun test

      - name: CLA logic tests
        run: bash .github/cla/cla.test.sh

  build:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: API report check
        run: bun run api:check

      - name: Parity contract check
        run: bun run check:parity-contract

      - name: i18n per-locale bundle size check
        run: bun run check:i18n-bundle-size

      - name: Docs JSON generation (smoke test)
        # Not committed — `docs/json/` is gitignored. Run as a smoke test
        # so any breakage in the generator surfaces here instead of when
        # the docs site (`docx-editor-page`) tries to consume it.
        run: bun run docs:json
